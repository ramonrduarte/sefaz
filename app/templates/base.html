<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Portal NF-e / CT-e{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { background: #f0f2f5; }

    .sidebar {
      width: 230px;
      min-height: calc(100vh - 56px);
      background: #1a1d23;
      flex-shrink: 0;
    }

    .sidebar .nav-link {
      color: #adb5bd;
      padding: .6rem 1.2rem;
      border-radius: .375rem;
      margin: 2px 8px;
      font-size: .9rem;
      transition: background .15s, color .15s;
    }

    .sidebar .nav-link:hover { background: #2c3038; color: #fff; }
    .sidebar .nav-link.active { background: #0d6efd; color: #fff; }
    .sidebar .nav-link i { width: 20px; }

    .sidebar-brand {
      padding: 1rem 1.2rem .75rem;
      color: #fff;
      font-weight: 600;
      font-size: 1rem;
      border-bottom: 1px solid #2c3038;
      margin-bottom: .5rem;
    }

    .main-content { flex: 1; min-width: 0; padding: 2rem; }

    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); }

    .badge-valido    { background: #198754; }
    .badge-expirando { background: #ffc107; color: #000; }
    .badge-expirado  { background: #dc3545; }
    .badge-erro      { background: #dc3545; }
    .badge-nao_configurado { background: #6c757d; }

    .terminal {
      background: #1a1d23;
      color: #a8ff78;
      font-family: 'Courier New', monospace;
      font-size: .82rem;
      min-height: 320px;
      max-height: 520px;
      overflow-y: auto;
      padding: 1rem;
      border-radius: .5rem;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .terminal .linha-erro    { color: #ff6b6b; }
    .terminal .linha-sucesso { color: #51cf66; }
    .terminal .linha-aviso   { color: #ffd43b; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top" style="height:56px">
  <div class="container-fluid">
    <span class="navbar-brand fw-bold">
      <i class="bi bi-file-earmark-text me-2"></i>Portal NF-e / CT-e
    </span>
    <span class="navbar-text text-white-50 small d-none d-md-block">SEFAZ-RS · Integração Contabilista</span>
  </div>
</nav>

<div class="d-flex" style="margin-top:56px">

  <nav class="sidebar">
    <div class="sidebar-brand"><i class="bi bi-diagram-3 me-2"></i>Menu</div>
    <ul class="nav flex-column">
      <li class="nav-item">
        <a class="nav-link {% if current == 'dashboard' %}active{% endif %}" href="/">
          <i class="bi bi-speedometer2 me-2"></i>Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if current == 'certificado' %}active{% endif %}" href="/certificado">
          <i class="bi bi-shield-lock me-2"></i>Certificado
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if current == 'configuracoes' %}active{% endif %}" href="/configuracoes">
          <i class="bi bi-gear me-2"></i>Configurações
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if current == 'sincronizar' %}active{% endif %}" href="/sincronizar">
          <i class="bi bi-cloud-download me-2"></i>Sincronizar
        </a>
      </li>
    </ul>
  </nav>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
