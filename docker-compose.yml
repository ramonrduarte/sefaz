version: "3.9"

# ═══════════════════════════════════════════════════════════════════
#  Variáveis obrigatórias — configurar no Portainer → Stack → Env
#
#  SHARE_PATH    Apenas o caminho do compartilhamento raiz
#                Formato:  //IP/nome-do-share
#                Exemplo:  //192.168.0.119/Publico
#                ATENÇÃO: não inclua subpastas aqui!
#                Se quiser salvar em subpasta, configure
#                a "Pasta de destino" como /notas/SuaPasta
#                dentro do sistema web.
#
#  SHARE_USER    Usuário com acesso ao compartilhamento
#  SHARE_PASS    Senha do usuário
#
# ───────────────────────────────────────────────────────────────────
#  Variáveis opcionais
#
#  PORT          Porta exposta pelo container    (padrão: 8080)
#  SHARE_VERS    Versão SMB: 1.0, 2.0, 2.1, 3.0 (padrão: 3.0)
#                Tente 2.0 ou 1.0 se der erro de mount
#  TZ            Fuso horário                    (padrão: America/Sao_Paulo)
# ═══════════════════════════════════════════════════════════════════

services:
  notas-sefaz:
    build: .
    container_name: notas-sefaz
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - notas_data:/app/data
      - notas_xmls:/notas
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
      - DATA_DIR=/app/data

volumes:
  notas_data:
    driver: local

  notas_xmls:
    driver: local
    driver_opts:
      type: cifs
      device: "${SHARE_PATH}"
      o: "username=${SHARE_USER},password=${SHARE_PASS},vers=${SHARE_VERS:-3.0},iocharset=utf8,noperm"
