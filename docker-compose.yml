version: "3.9"

# ═══════════════════════════════════════════════════════════════════
#  Variáveis obrigatórias — configurar no Portainer → Stack → Env
#
#  SHARE_PATH    Caminho UNC da pasta de rede compartilhada
#                Exemplo:  //192.168.1.10/notas
#                          //servidor/documentos/notas-fiscais
#
#  SHARE_USER    Usuário com acesso ao compartilhamento
#  SHARE_PASS    Senha do usuário
#
# ───────────────────────────────────────────────────────────────────
#  Variáveis opcionais
#
#  PORT          Porta exposta pelo container    (padrão: 8080)
#  SHARE_DOMAIN  Domínio Windows, se necessário  (padrão: vazio)
#  TZ            Fuso horário                    (padrão: America/Sao_Paulo)
# ═══════════════════════════════════════════════════════════════════

services:
  notas-sefaz:
    build: .
    container_name: notas-sefaz
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - notas_data:/app/data      # config, certificado, chave de criptografia
      - notas_xmls:/notas         # pasta de rede → XMLs organizados por data
    environment:
      - TZ=${TZ:-America/Sao_Paulo}
      - DATA_DIR=/app/data

volumes:
  # Volume interno — persiste config e certificado entre restarts
  notas_data:
    driver: local

  # Volume montado na pasta de rede via protocolo SMB/CIFS
  notas_xmls:
    driver: local
    driver_opts:
      type: cifs
      device: "${SHARE_PATH}"
      o: "username=${SHARE_USER},password=${SHARE_PASS},domain=${SHARE_DOMAIN:-},vers=3.0,uid=0,gid=0,file_mode=0777,dir_mode=0777"
